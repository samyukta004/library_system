{% extends 'base.html' %}
{% block content %}
<h3>4. Borrow / Return Transactions</h3>

<div class="row">
    {% for book in books %}
    <div class="col-md-4 mb-3">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ book.title }}</h5>
                <p class="card-text text-muted">By {{ book.author }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge {% if book.available_stock > 0 %}bg-success{% else %}bg-danger{% endif %}">
                        Available: {{ book.available_stock }} / {{ book.total_stock }}
                    </span>
                </div>
                <div class="mt-3">
                    <a href="/action/borrow/{{ book.id }}" 
                       class="btn btn-primary btn-sm {% if book.available_stock == 0 %}disabled{% endif %}">
                       Borrow Book
                    </a>
                    <a href="/action/return/{{ book.id }}" 
                       class="btn btn-outline-secondary btn-sm">
                       Return Book
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
